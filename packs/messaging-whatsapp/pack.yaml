pack_id: messaging-whatsapp
version: 0.4.9
kind: application
publisher: Greentic

components:
  - id: "messaging-provider-whatsapp"
    kind: messaging
    version: 0.4.9
    world: "greentic:provider/schema-core@1.0.0"
    supports: ["messaging"]
    profiles:
      default: "default"
      supported: ["default"]
    capabilities:
      wasi: {}
      host: {}
    wasm: "components/messaging-provider-whatsapp.wasm"

extensions:
  greentic.provider-extension.v1:
    kind: greentic.provider-extension.v1
    version: 0.4.9
    inline:
      providers:
        - kind: messaging
          provider_type: "messaging.whatsapp.cloud"
          capabilities: ["messaging"]
          ops: ["send", "reply"]
          config_schema_ref: "schemas/messaging/whatsapp/config.schema.json"
          state_schema_ref: ""
          runtime:
            component_ref: "messaging-provider-whatsapp"
            export: "schema-core-api"
            world: "greentic:provider/schema-core@1.0.0"
          docs_ref: ""
  messaging.provider_flow_hints:
    kind: messaging.provider_flow_hints
    version: 0.4.9
    inline:
      messaging.whatsapp.cloud:
        setup_default: setup_default
        setup_custom: setup_custom
        diagnostics: diagnostics
        verify_webhooks: verify_webhooks

schemas:
  - kind: config
    version: 0.4.9
    path: "schemas/messaging/whatsapp/config.schema.json"

secret_requirements:
  - name: "WHATSAPP_TOKEN"
    scope: "tenant"
    description: "WhatsApp Cloud API access token"

dependencies: []

assets: []

flows:
  - id: setup_default
    kind: job
    version: 0.4.9
    file: flows/setup_default.ygtc
    tags: [default]
    entrypoints: [setup]
  - id: setup_custom
    kind: job
    version: 0.4.9
    file: flows/setup_custom.ygtc
    tags: [default]
    entrypoints: [setup]
  - id: diagnostics
    kind: job
    version: 0.4.9
    file: flows/diagnostics.ygtc
    tags: [default]
    entrypoints: [diagnostics]
  - id: verify_webhooks
    kind: job
    version: 0.4.9
    file: flows/verify_webhooks.ygtc
    tags: [maintenance]
    entrypoints: [diagnostics]
