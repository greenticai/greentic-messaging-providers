pack_id: state-memory
version: 0.4.37
kind: application
publisher: Greentic
name: In-Memory State Provider
components:
- id: state-provider-memory
  version: 0.4.37
  world: greentic:component/component-v0-v6-v0
  supports:
  - component_config
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/state-provider-memory/state-provider-memory.wasm
- id: ai.greentic.component-provision
  version: 0.4.37
  world: greentic:component/component@0.5.0
  supports:
  - messaging
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    host:
      state:
        delete: false
        read: false
        write: true
      telemetry:
        scope: node
    wasi:
      clocks: false
      filesystem:
        mode: none
        mounts: []
      random: false
  wasm: components/provision/provision.wasm
- id: ai.greentic.component-qa
  version: 0.4.37
  world: greentic:component/component@0.5.0
  supports:
  - messaging
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    host:
      messaging:
        inbound: true
        outbound: true
      qa:
        process: true
      secrets:
        required: []
      telemetry:
        scope: node
    wasi:
      clocks: true
      filesystem:
        mode: none
        mounts: []
      random: true
  wasm: components/qa/qa.wasm
dependencies: []
flows:
- id: setup_default
  file: flows/setup_default.ygtc
  tags:
  - default
  entrypoints:
  - default
assets:
- path: secret-requirements.json
extensions:
  greentic.ext.capabilities.v1:
    kind: greentic.ext.capabilities.v1
    version: 0.4.37
    inline:
      offers:
      - cap_id: greentic.cap.state.kv.v1
        metadata:
          backend: memory
          ephemeral: true
        offer_id: state.memory.kv.01
        priority: 100
        provider:
          component_ref: state-provider-memory
          op: state.dispatch
        requires_setup: false
        version: 0.4.37
      schema_version: 1
