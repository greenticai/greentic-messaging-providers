provider_id: email
version: 1
title: Email provider setup (Microsoft Graph)
questions:
  - name: from_address
    title: From address
    kind: string
    required: true
    help: "Sender email address (e.g. bot@yourdomain.com)"
  - name: graph_tenant_id
    title: Graph tenant ID
    kind: string
    required: true
    secret: true
    help: "Azure AD tenant ID (Directory ID)"
  - name: ms_graph_client_id
    title: Graph client ID
    kind: string
    required: true
    secret: true
    help: "Azure AD app registration client/application ID"
  - name: ms_graph_refresh_token
    title: Graph refresh token
    kind: string
    required: false
    secret: true
    help: "OAuth refresh token (delegated permissions, /me/sendMail)"
  - name: ms_graph_client_secret
    title: Graph client secret
    kind: string
    required: false
    secret: true
    help: "App client secret (for client_credentials grant, optional if using refresh token)"
  - name: public_base_url
    title: Public base URL
    kind: string
    required: false
    help: "Public URL for webhook callbacks (optional for email)"
    validate:
      regex: "^https://"
