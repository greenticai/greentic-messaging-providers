provider_id: teams
version: 1
title: Microsoft Teams Bot Framework provider setup
questions:
  - name: ms_bot_app_id
    title: Bot App ID
    kind: string
    required: true
    help: "Microsoft Bot App ID from Azure Bot Service registration"
  - name: ms_bot_app_password
    title: Bot App Password
    kind: string
    required: true
    secret: true
    help: "Client secret from Azure Bot Service"
  - name: public_base_url
    title: Public base URL
    kind: string
    required: true
    help: "Example: https://xxxx.ngrok-free.app"
  - name: team_id
    title: Team ID
    kind: string
    required: false
  - name: channel_id
    title: Channel ID
    kind: string
    required: false
