pack_id: messaging-teams
version: 0.4.34
kind: application
publisher: Greentic
description: "Microsoft Teams messaging provider — Bot Framework with webhook ingress"

components:
  - id: messaging-provider-teams
    version: 0.4.34
    world: greentic:component/component-v0-v6-v0@0.6.1
    supports: [messaging]
    profiles: { default: default, supported: [default] }
    capabilities:
      wasi: { random: false, clocks: false }
      host: { secrets-store: true, http-client: true }
    wasm: components/messaging-provider-teams/component.wasm

  - id: messaging-ingress-teams
    version: 0.4.34
    world: greentic:messaging-ingress-teams/messaging-ingress-teams@0.0.1
    supports: [messaging]
    profiles: { default: default, supported: [default] }
    capabilities:
      wasi: { random: false, clocks: false }
      host: { secrets-store: true, state-store: true, http-client: true }
    wasm: components/messaging-ingress-teams/component.wasm

flows:
  - id: setup_default
    file: flows/setup_default.ygtc
    tags: [default]
    entrypoints: [setup]
  - id: requirements
    file: flows/requirements.ygtc
    tags: [default]
    entrypoints: [requirements]

assets:
  - path: setup.yaml
  - path: schemas/messaging/teams/public.config.schema.json
  - path: fixtures/requirements.expected.json
  - path: fixtures/setup.input.json
  - path: fixtures/setup.expected.plan.json
  - path: fixtures/egress.request.json
  - path: fixtures/egress.expected.summary.json
  - path: fixtures/ingress.request.json
  - path: fixtures/ingress.expected.message.json
  - path: fixtures/subscriptions.desired.json
  - path: fixtures/subscriptions.expected.ops.json

extensions:
  greentic.ext.capabilities.v1:
    kind: greentic.ext.capabilities.v1
    version: 0.4.0
    inline:
      schema_version: 1
      offers:
        - offer_id: "messaging-teams-v1"
          cap_id: "greentic.cap.messaging.provider.v1"
          version: "v1"
          provider:
            component_ref: "messaging-provider-teams"
            op: "messaging.configure"
          priority: 100
          requires_setup: true
          setup:
            qa_ref: "setup.yaml"

  greentic.messaging.validators.v1:
    kind: greentic.messaging.validators.v1
    version: 0.4.34
    inline:
      validators:
      - component_ref: oci://ghcr.io/greenticai/validators/messaging:0.4.19
        id: greentic.validators.messaging
        world: greentic:pack-validate/pack-validator@0.1.0

  greentic.provider-extension.v1:
    kind: greentic.provider-extension.v1
    version: 0.4.34
    inline:
      providers:
        - provider_type: messaging.teams.bot
          capabilities:
            - messaging
          ops:
            - send
            - reply
            - subscription_ensure
            - subscription_renew
            - subscription_delete
            - qa-spec
            - apply-answers
            - i18n-keys
          config_schema_ref: schemas/messaging/teams/public.config.schema.json
          runtime:
            component_ref: messaging-provider-teams
            export: schema-core-api
            world: greentic:provider/schema-core@1.0.0

  messaging.provider_flow_hints:
    kind: messaging.provider_flow_hints
    version: 0.4.34
    inline:
      messaging.teams.bot:
        default: default
        diagnostics: diagnostics
        remove: remove
        setup_default: setup_default
        update: update
        verify_webhooks: verify_webhooks

  messaging.oauth.v1:
    kind: messaging.oauth.v1
    version: 0.4.34
    inline:
      auth_type: oauth2
      authorize_url: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
      provider_id: teams
      redirect_path: /oauth/callback/teams
      scopes:
      - https://graph.microsoft.com/.default
      secret_keys:
      - TEAMS_BOT_TOKEN
      token_url: https://login.microsoftonline.com/common/oauth2/v2.0/token

  messaging.provider_ingress.v1:
    kind: messaging.provider_ingress.v1
    version: 0.4.34
    inline:
      capabilities:
        content_types:
          - application/json
        supports_webhook_validation: false
      component_ref: messaging-ingress-teams
      export: handle-webhook
      world: greentic:messaging-ingress-teams/messaging-ingress-teams@0.0.1

  messaging.subscriptions.v1:
    kind: messaging.subscriptions.v1
    version: 0.4.34
    inline:
      component_ref: messaging-ingress-teams
      export: sync-subscriptions
      pattern: sync
      renewal_window_hours: 24
      resources:
      - message
      - reaction
      world: greentic:messaging-ingress-teams/messaging-ingress-teams@0.0.1

