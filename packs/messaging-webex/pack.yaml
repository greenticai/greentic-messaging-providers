pack_id: messaging-webex
version: 0.4.34
kind: application
publisher: Greentic
description: "Webex messaging provider — Bot API with Adaptive Cards"

components:
  - id: messaging-provider-webex
    version: 0.4.34
    world: greentic:component/component-v0-v6-v0@0.6.1
    supports: [messaging]
    profiles: { default: default, supported: [default] }
    capabilities:
      wasi: { random: false, clocks: false }
      host: { secrets-store: true, http-client: true }
    wasm: components/messaging-provider-webex/component.wasm

flows:
  - id: setup_default
    file: flows/setup_default.ygtc
    tags: [default]
    entrypoints: [setup]
  - id: requirements
    file: flows/requirements.ygtc
    tags: [default]
    entrypoints: [requirements]

assets:
  - path: setup.yaml
  - path: schemas/messaging/webex/public.config.schema.json
  - path: fixtures/requirements.expected.json
  - path: fixtures/setup.input.json
  - path: fixtures/setup.expected.plan.json
  - path: fixtures/egress.request.json
  - path: fixtures/egress.expected.summary.json
  - path: fixtures/ingress.request.json
  - path: fixtures/ingress.expected.message.json

extensions:
  greentic.ext.capabilities.v1:
    kind: greentic.ext.capabilities.v1
    version: 0.4.0
    inline:
      schema_version: 1
      offers:
        - offer_id: "messaging-webex-v1"
          cap_id: "greentic.cap.messaging.provider.v1"
          version: "v1"
          provider:
            component_ref: "messaging-provider-webex"
            op: "messaging.configure"
          priority: 100
          requires_setup: true
          setup:
            qa_ref: "setup.yaml"

  greentic.messaging.validators.v1:
    kind: greentic.messaging.validators.v1
    version: 0.4.34
    inline:
      validators:
      - component_ref: oci://ghcr.io/greenticai/validators/messaging:0.4.19
        id: greentic.validators.messaging
        world: greentic:pack-validate/pack-validator@0.1.0

  greentic.provider-extension.v1:
    kind: greentic.provider-extension.v1
    version: 0.4.34
    inline:
      providers:
        - provider_type: messaging.webex.bot
          capabilities:
            - messaging
          ops:
            - send
            - reply
            - qa-spec
            - apply-answers
            - i18n-keys
          config_schema_ref: schemas/messaging/webex/public.config.schema.json
          runtime:
            component_ref: messaging-provider-webex
            export: schema-core-api
            world: greentic:provider/schema-core@1.0.0

  messaging.provider_flow_hints:
    kind: messaging.provider_flow_hints
    version: 0.4.34
    inline:
      messaging.webex.bot:
        default: default
        diagnostics: diagnostics
        remove: remove
        setup_default: setup_default
        update: update
        verify_webhooks: verify_webhooks

