pack_id: messaging-slack
version: 0.4.34
kind: application
publisher: Greentic
description: "Slack messaging provider — Bot API with Events API ingress"

components:
  - id: messaging-provider-slack
    version: 0.4.34
    world: greentic:component/component-v0-v6-v0@0.6.1
    supports: [messaging]
    profiles: { default: default, supported: [default] }
    capabilities:
      wasi: { random: false, clocks: false }
      host: { secrets-store: true, http-client: true }
    wasm: components/messaging-provider-slack.wasm

  - id: messaging-ingress-slack
    version: 0.4.34
    world: greentic:messaging-ingress-slack/messaging-ingress-slack@0.0.1
    supports: [messaging]
    profiles: { default: default, supported: [default] }
    capabilities:
      wasi: { random: false, clocks: false }
      host: { secrets-store: true, state-store: true, http-client: true }
    wasm: components/messaging-ingress-slack.wasm

flows:
  - id: setup_default
    file: flows/setup_default.ygtc
    tags: [default]
    entrypoints: [setup]
  - id: requirements
    file: flows/requirements.ygtc
    tags: [default]
    entrypoints: [requirements]

assets:
  - path: setup.yaml
  - path: schemas/messaging/slack/public.config.schema.json
  - path: fixtures/requirements.expected.json
  - path: fixtures/setup.input.json
  - path: fixtures/setup.expected.plan.json
  - path: fixtures/egress.request.json
  - path: fixtures/egress.expected.summary.json
  - path: fixtures/ingress.request.json
  - path: fixtures/ingress.expected.message.json

extensions:
  greentic.ext.capabilities.v1:
    kind: greentic.ext.capabilities.v1
    version: 0.4.0
    inline:
      schema_version: 1
      offers:
        - offer_id: "messaging-slack-v1"
          cap_id: "greentic.cap.messaging.v1"
          version: "v1"
          provider:
            component_ref: "messaging-provider-slack"
            op: "messaging.configure"
          priority: 100
          requires_setup: true
          setup:
            qa_ref: "setup.yaml"

  greentic.provider-extension.v1:
    kind: greentic.provider-extension.v1
    version: 0.4.34
    inline:
      providers:
        - provider_type: messaging.slack.api
          capabilities:
            - messaging
          ops:
            - send
            - reply
            - qa-spec
            - apply-answers
            - i18n-keys
          config_schema_ref: schemas/messaging/slack/public.config.schema.json
          runtime:
            component_ref: messaging-provider-slack
            export: schema-core-api
            world: greentic:provider/schema-core@1.0.0

  messaging.oauth.v1:
    kind: messaging.oauth.v1
    version: 0.4.34
    inline:
      auth_type: oauth2
      authorize_url: https://slack.com/oauth/v2/authorize
      provider_id: slack
      redirect_path: /oauth/callback/slack
      scopes:
        - chat:write
        - channels:read
        - channels:history
      secret_keys:
        - SLACK_BOT_TOKEN
      token_url: https://slack.com/api/oauth.v2.access

  messaging.provider_ingress.v1:
    kind: messaging.provider_ingress.v1
    version: 0.4.34
    inline:
      capabilities:
        content_types:
          - application/json
        supports_webhook_validation: true
      component_ref: messaging-ingress-slack
      export: handle-webhook
      world: greentic:messaging-ingress-slack/messaging-ingress-slack@0.0.1
