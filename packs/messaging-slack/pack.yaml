pack_id: messaging-slack
version: 0.4.38
kind: application
publisher: Greentic
description: "Slack messaging provider \u2014 Bot API with Events API ingress"
components:
- id: messaging-provider-slack
  version: 0.4.38
  world: greentic:component/component-v0-v6-v0@0.6.1
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host:
      secrets-store: true
      http-client: true
  wasm: components/messaging-provider-slack/component.wasm
- id: messaging-ingress-slack
  version: 0.4.38
  world: greentic:messaging-ingress-slack/messaging-ingress-slack@0.0.1
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host:
      secrets-store: true
      state-store: true
      http-client: true
  wasm: components/messaging-ingress-slack/component.wasm
- id: ai.greentic.component-provision
  version: 0.4.38
  world: greentic:component/component@0.5.0
  supports:
  - messaging
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    host:
      state:
        delete: false
        read: false
        write: true
      telemetry:
        scope: node
    wasi:
      clocks: false
      filesystem:
        mode: none
        mounts: []
      random: false
  wasm: components/provision/provision.wasm
- id: ai.greentic.component-qa
  version: 0.4.38
  world: greentic:component/component@0.5.0
  supports:
  - messaging
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    host:
      messaging:
        inbound: true
        outbound: true
      qa:
        process: true
      secrets:
        required: []
      telemetry:
        scope: node
    wasi:
      clocks: true
      filesystem:
        mode: none
        mounts: []
      random: true
  wasm: components/qa/qa.wasm
flows:
- id: default
  file: flows/default.ygtc
  tags:
  - default
  entrypoints:
  - default
- id: diagnostics
  file: flows/diagnostics.ygtc
  tags:
  - default
  entrypoints:
  - diagnostics
- id: remove
  file: flows/remove.ygtc
  tags:
  - default
  entrypoints:
  - remove
- id: setup_default
  file: flows/setup_default.ygtc
  tags:
  - default
  entrypoints:
  - setup
- id: requirements
  file: flows/requirements.ygtc
  tags:
  - default
  entrypoints:
  - requirements
- id: rotate_credentials
  file: flows/rotate_credentials.ygtc
  tags:
  - default
  entrypoints:
  - rotate_credentials
- id: sync_subscriptions
  file: flows/sync_subscriptions.ygtc
  tags:
  - default
  entrypoints:
  - subscriptions
- id: update
  file: flows/update.ygtc
  tags:
  - default
  entrypoints:
  - update
- id: verify_webhooks
  file: flows/verify_webhooks.ygtc
  tags:
  - default
  entrypoints:
  - verify_webhooks
assets:
- path: secret-requirements.json
- path: setup.yaml
- path: schemas/messaging/slack/public.config.schema.json
- path: fixtures/requirements.expected.json
- path: fixtures/setup.input.json
- path: fixtures/setup.expected.plan.json
- path: fixtures/egress.request.json
- path: fixtures/egress.expected.summary.json
- path: fixtures/ingress.request.json
- path: fixtures/ingress.expected.message.json
extensions:
  greentic.ext.capabilities.v1:
    kind: greentic.ext.capabilities.v1
    version: 0.4.37
    inline:
      schema_version: 1
      offers:
      - offer_id: messaging-slack-v1
        cap_id: greentic.cap.messaging.provider.v1
        version: 0.4.37
        provider:
          component_ref: messaging-provider-slack
          op: messaging.configure
        priority: 100
        requires_setup: true
        setup:
          qa_ref: setup.yaml
  greentic.messaging.validators.v1:
    kind: greentic.messaging.validators.v1
    version: 0.4.37
    inline:
      validators:
      - component_ref: oci://ghcr.io/greenticai/validators/messaging:0.4.19
        id: greentic.validators.messaging
        world: greentic:pack-validate/pack-validator@0.1.0
  greentic.provider-extension.v1:
    kind: greentic.provider-extension.v1
    version: 0.4.37
    inline:
      providers:
      - provider_type: messaging.slack.api
        capabilities:
        - messaging
        ops:
        - send
        - reply
        - qa-spec
        - apply-answers
        - i18n-keys
        config_schema_ref: schemas/messaging/slack/public.config.schema.json
        runtime:
          component_ref: messaging-provider-slack
          export: schema-core-api
          world: greentic:provider/schema-core@1.0.0
  messaging.oauth.v1:
    kind: messaging.oauth.v1
    version: 0.4.37
    inline:
      auth_type: oauth2
      authorize_url: https://slack.com/oauth/v2/authorize
      provider_id: slack
      redirect_path: /oauth/callback/slack
      scopes:
      - chat:write
      - channels:read
      - channels:history
      secret_keys:
      - SLACK_BOT_TOKEN
      token_url: https://slack.com/api/oauth.v2.access
  messaging.provider_flow_hints:
    kind: messaging.provider_flow_hints
    version: 0.4.37
    inline:
      messaging.slack.api:
        default: default
        diagnostics: diagnostics
        remove: remove
        rotate_credentials: rotate_credentials
        setup_default: setup_default
        update: update
        verify_webhooks: verify_webhooks
  messaging.provider_ingress.v1:
    kind: messaging.provider_ingress.v1
    version: 0.4.37
    inline:
      capabilities:
        content_types:
        - application/json
        supports_webhook_validation: true
      component_ref: messaging-ingress-slack
      export: handle-webhook
      world: greentic:messaging-ingress-slack/messaging-ingress-slack@0.0.1
