pack_id: messaging-slack
version: 0.4.9
kind: application
publisher: Greentic

components:
  - id: "messaging-provider-slack"
    kind: messaging
    version: 0.4.9
    world: "greentic:provider/schema-core@1.0.0"
    supports: ["messaging"]
    profiles:
      default: "default"
      supported: ["default"]
    capabilities:
      wasi: {}
      host: {}
    wasm: "components/messaging-provider-slack.wasm"

extensions:
  greentic.provider-extension.v1:
    kind: greentic.provider-extension.v1
    version: 0.4.9
    inline:
      providers:
        - kind: messaging
          provider_type: "messaging.slack.api"
          capabilities: ["messaging"]
          ops: ["send", "reply"]
          config_schema_ref: "schemas/messaging/slack/config.schema.json"
          state_schema_ref: ""
          runtime:
            component_ref: "messaging-provider-slack"
            export: "schema-core-api"
            world: "greentic:provider/schema-core@1.0.0"
          docs_ref: ""
  messaging.provider_flow_hints:
    kind: messaging.provider_flow_hints
    version: 0.4.9
    inline:
      messaging.slack.api:
        setup_default: setup_default
        setup_custom: setup_custom
        diagnostics: diagnostics
        verify_webhooks: verify_webhooks
        rotate_credentials: rotate_credentials

schemas:
  - kind: config
    version: 0.4.9
    path: "schemas/messaging/slack/config.schema.json"

secret_requirements:
  - name: "SLACK_BOT_TOKEN"
    scope: "tenant"
    description: "Slack bot token used for chat.postMessage"
  - name: "SLACK_SIGNING_SECRET"
    scope: "tenant"
    description: "Slack signing secret (optional)"

dependencies: []

assets: []

flows:
  - id: setup_default
    kind: job
    version: 0.4.9
    file: flows/setup_default.ygtc
    tags: [default]
    entrypoints: [setup]
  - id: setup_custom
    kind: job
    version: 0.4.9
    file: flows/setup_custom.ygtc
    tags: [default]
    entrypoints: [setup]
  - id: diagnostics
    kind: job
    version: 0.4.9
    file: flows/diagnostics.ygtc
    tags: [default]
    entrypoints: [diagnostics]
  - id: verify_webhooks
    kind: job
    version: 0.4.9
    file: flows/verify_webhooks.ygtc
    tags: [default]
    entrypoints: [diagnostics]
  - id: rotate_credentials
    kind: job
    version: 0.4.9
    file: flows/rotate_credentials.ygtc
    tags: [maintenance]
    entrypoints: [maintenance]
